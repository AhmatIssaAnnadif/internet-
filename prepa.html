<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
</head>
<body>
<code>
      <!-- tarayıcı h1'i etiket olarak yorumlar -->
      <h1>This is a heading</h1>
      <!-- ekranda  metin olarak <h1> This is a heading</h1> yazısı çıkar-->
      &lt;h1&gt;This is a heading &lt;/h1&gt;
      <!-- &nbsp; boşluk(bildiğimiz space tuşuna basılmasıyla oluşandan) bırakılmasını sağlar. -->
      <p>This is the first &nbsp;&nbsp;&nbsp; paragraph</p>
&lt;h1&gt;This is a heading &lt;/h1&gt;
      <p>Copyright &copy; 2024</p>
</code>

    
</body>
</html>
